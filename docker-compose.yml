services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cpe-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - PORT=8000
      - SENTRY_DSN=${SENTRY_DSN}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # SigNoz / OTLP: 4317=gRPC, 4318=HTTP (auto picks protocol from port when PROTOCOL=auto)
      - OPENTELEMETRY_ENDPOINT=${OPENTELEMETRY_ENDPOINT:-}
      - OPENTELEMETRY_PROTOCOL=${OPENTELEMETRY_PROTOCOL:-auto}
      - OPENTELEMETRY_SERVICE_NAME=${OPENTELEMETRY_SERVICE_NAME:-career-profile-evaluation-api}
      - OPENTELEMETRY_INSECURE=${OPENTELEMETRY_INSECURE:-true}
      - LOAD_TEST_MOCK_OPENAI=${LOAD_TEST_MOCK_OPENAI:-false}
    networks:
      - app-network
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/career-profile-tool/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NPM_TOKEN: ${NPM_TOKEN}
        REACT_APP_TURNSTILE_SITEKEY: ${REACT_APP_TURNSTILE_SITEKEY}
    container_name: cpe-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    
  otel-collector:
    image: signoz/signoz-otel-collector:0.88.8
    container_name: cpe-otel-collector
    restart: unless-stopped
    command: ["--config", "/config.yml"]
    volumes:
      - ./otel-collector-config.yml:/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge